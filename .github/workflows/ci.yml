name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libgpiod-dev pkg-config

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  arduino:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Install AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile Arduino smoke example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/arduino/EventLoopSmoke

      - name: Compile Arduino byte stream example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/arduino/SerialByteStreamEcho

      - name: Compile Arduino datagram stream example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/arduino/DatagramStreamExample

      - name: Compile Arduino pin event example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/arduino/PinEventExample
