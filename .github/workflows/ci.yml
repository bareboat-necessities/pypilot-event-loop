name: CI

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libevent-dev libgpiod-dev pkg-config

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  arduino:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: arduino/setup-arduino-cli@v2

      - name: Install AVR core
        run: |
          arduino-cli core update-index
          arduino-cli core install arduino:avr

      - name: Compile portable timer example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/EventLoopTimerExample

      - name: Compile portable line protocol example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/LineProtocolExample

      - name: Compile portable fixed header protocol example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/FixedHeaderProtocolExample

      - name: Compile portable serial line protocol example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/SerialLineProtocolExample

      - name: Compile portable pin event example
        run: arduino-cli compile --fqbn arduino:avr:mega --libraries . examples/PinEventExample
