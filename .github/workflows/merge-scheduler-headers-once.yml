name: One-shot scheduler header merge

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/merge-scheduler-headers-once.yml

permissions:
  contents: write

jobs:
  merge:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge clock and task headers into scheduler
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          cat > src/async_event_loop/scheduler.hpp <<'EOF'
          #pragma once

          #include <stdint.h>

          namespace async_event_loop {

          class IClock {
          public:
              virtual ~IClock() = default;
              virtual uint64_t micros() const = 0;
          };

          class IRuntimeTask {
          public:
              virtual ~IRuntimeTask() = default;
              virtual void poll(uint64_t now_us) = 0;
          };

          class IScheduler {
          public:
              virtual ~IScheduler() = default;

              virtual bool valid() const = 0;

              virtual bool add_periodic(IRuntimeTask& task, uint64_t period_us) = 0;
              virtual bool add_one_shot(IRuntimeTask& task, uint64_t due_us) = 0;
              virtual bool remove(IRuntimeTask& task) = 0;

              virtual void run_once() = 0;
              virtual void run_forever() = 0;
              virtual void request_exit() = 0;
          };

          } // namespace async_event_loop
          EOF

          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              '#include "async_event_loop/clock.hpp"\n': '',
              '#include "async_event_loop/task.hpp"\n': '',
              '#include "clock.hpp"\n': '#include "scheduler.hpp"\n',
              '#include "task.hpp"\n': '#include "scheduler.hpp"\n',
              '#include "../async_event_loop/clock.hpp"\n': '#include "../async_event_loop/scheduler.hpp"\n',
              '#include "../async_event_loop/task.hpp"\n': '#include "../async_event_loop/scheduler.hpp"\n',
              '#include <async_event_loop/clock.hpp>\n': '#include <async_event_loop/scheduler.hpp>\n',
              '#include <async_event_loop/task.hpp>\n': '#include <async_event_loop/scheduler.hpp>\n',
          }

          for path in Path('.').rglob('*'):
              if not path.is_file() or '.git' in path.parts:
                  continue
              try:
                  text = path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated = text
              for old, new in replacements.items():
                  updated = updated.replace(old, new)
              if updated != text:
                  path.write_text(updated, encoding='utf-8')
          PY

          rm -f src/async_event_loop/clock.hpp src/async_event_loop/task.hpp
          git rm -f .github/workflows/merge-scheduler-headers-once.yml
          git add -A

          if git grep -n 'clock.hpp\|task.hpp' -- ':!README.md' ; then
            echo 'Stale clock.hpp or task.hpp references remain' >&2
            exit 1
          fi
          if test -e src/async_event_loop/clock.hpp || test -e src/async_event_loop/task.hpp; then
            echo 'Merged headers still exist' >&2
            exit 1
          fi

          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "Merge clock and task headers into scheduler"
          git push origin HEAD:main
